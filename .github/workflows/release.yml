name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing or new release tag (must begin with v)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  GODOT_VERSION: 4.7-stable
  GODOT_TEMPLATE_VERSION: 4.7.stable
  GODOT_EDITOR_SHA512: b639ca9c1ddea39bb3df89bd5283a51ca6047467abe6b25e9436566f2b2082ede633025073989ecf39c7d5d3c2493d80ea13e3af6dd5e261bbf89e462d6d2214
  GODOT_TEMPLATES_SHA512: 1035dfde4edcc2472bb0c0b9610ce3ee9302642c2b9957e9066372f9f6bb759ab250c8887551a66f0bc5f51bbd9a58bb45e33a0f29844e97615a9b1138c1120e
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build-and-release:
    name: Build and publish unsigned desktop packages
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          case "$RELEASE_TAG" in
            v[0-9]*) ;;
            *)
              echo "Release tag must begin with v followed by a digit: $RELEASE_TAG" >&2
              exit 2
              ;;
          esac

      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install verified Godot editor and templates
        shell: bash
        run: |
          set -euo pipefail
          editor_archive="$RUNNER_TEMP/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          template_archive="$RUNNER_TEMP/Godot_v${GODOT_VERSION}_export_templates.tpz"
          release_url="https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}"

          curl --proto '=https' --tlsv1.2 --fail --location --retry 3 \
            --output "$editor_archive" \
            "$release_url/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          curl --proto '=https' --tlsv1.2 --fail --location --retry 3 \
            --output "$template_archive" \
            "$release_url/Godot_v${GODOT_VERSION}_export_templates.tpz"

          printf '%s  %s\n' "$GODOT_EDITOR_SHA512" "$editor_archive" | sha512sum --check --strict
          printf '%s  %s\n' "$GODOT_TEMPLATES_SHA512" "$template_archive" | sha512sum --check --strict

          mkdir -p "$RUNNER_TEMP/godot-editor" "$RUNNER_TEMP/godot-templates" "$HOME/.local/bin"
          unzip -q "$editor_archive" -d "$RUNNER_TEMP/godot-editor"
          install -m 0755 \
            "$RUNNER_TEMP/godot-editor/Godot_v${GODOT_VERSION}_linux.x86_64" \
            "$HOME/.local/bin/godot"

          unzip -q "$template_archive" -d "$RUNNER_TEMP/godot-templates"
          template_dir="$HOME/.local/share/godot/export_templates/$GODOT_TEMPLATE_VERSION"
          mkdir -p "$template_dir"
          cp -R "$RUNNER_TEMP/godot-templates/templates/." "$template_dir/"

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/godot" --version

      - name: Import and test project
        run: |
          set -euo pipefail
          godot --headless --path . --import
          godot --headless --path . --quit
          GODOT_BIN=godot tools/run_tests.sh

      - name: Export desktop targets
        run: |
          set -euo pipefail
          mkdir -p build/windows build/linux build/dist
          godot --headless --path . --export-release \
            "Windows Desktop" build/windows/Sixty-Second-Accomplice.exe
          godot --headless --path . --export-release \
            "Linux" build/linux/Sixty-Second-Accomplice.x86_64
          godot --headless --path . --export-release \
            "macOS" build/dist/Sixty-Second-Accomplice-macos-universal.zip

          test -f build/windows/Sixty-Second-Accomplice.exe
          test -f build/linux/Sixty-Second-Accomplice.x86_64
          test -f build/dist/Sixty-Second-Accomplice-macos-universal.zip

      - name: Package and checksum builds
        run: |
          set -euo pipefail
          pushd build/windows
          zip -9 -r ../dist/Sixty-Second-Accomplice-windows-x86_64.zip .
          popd

          pushd build/linux
          zip -9 -r ../dist/Sixty-Second-Accomplice-linux-x86_64.zip .
          popd

          pushd build/dist
          sha256sum ./*.zip > SHA256SUMS.txt
          sha256sum --check SHA256SUMS.txt
          popd

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" build/dist/* --clobber
          else
            gh release create "$RELEASE_TAG" build/dist/* \
              --target "$GITHUB_SHA" \
              --title "Sixty-Second Accomplice $RELEASE_TAG" \
              --notes "Unsigned Windows, Linux, and macOS development builds. The macOS package is not code-signed or notarized and may trigger Gatekeeper. Verify downloads with SHA256SUMS.txt."
          fi
