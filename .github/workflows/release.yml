name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing or new release tag (must begin with v)
        required: true
        type: string

permissions: {}

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  GODOT_VERSION: 4.7-stable
  GODOT_TEMPLATE_VERSION: 4.7.stable
  GODOT_EDITOR_SHA512: b639ca9c1ddea39bb3df89bd5283a51ca6047467abe6b25e9436566f2b2082ede633025073989ecf39c7d5d3c2493d80ea13e3af6dd5e261bbf89e462d6d2214
  GODOT_TEMPLATES_SHA512: 1035dfde4edcc2472bb0c0b9610ce3ee9302642c2b9957e9066372f9f6bb759ab250c8887551a66f0bc5f51bbd9a58bb45e33a0f29844e97615a9b1138c1120e
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build unsigned desktop packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      build_sha: ${{ steps.metadata.outputs.sha }}

    steps:
      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9][0-9A-Za-z._-]*$ ]]; then
            echo "Release tag must match ^v[0-9][0-9A-Za-z._-]*$: $RELEASE_TAG" >&2
            exit 2
          fi

      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Record immutable build commit
        id: metadata
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-tools.txt

      - name: Validate committed art derivatives
        run: |
          set -euo pipefail
          python3 -m pip install --disable-pip-version-check -r requirements-tools.txt
          PYTHON_BIN=python3 bash tools/validate_assets.sh

      - name: Install verified Godot editor and templates
        shell: bash
        run: |
          set -euo pipefail
          editor_archive="$RUNNER_TEMP/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          template_archive="$RUNNER_TEMP/Godot_v${GODOT_VERSION}_export_templates.tpz"
          release_url="https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}"

          curl --proto '=https' --tlsv1.2 --fail --location --retry 3 \
            --output "$editor_archive" \
            "$release_url/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          curl --proto '=https' --tlsv1.2 --fail --location --retry 3 \
            --output "$template_archive" \
            "$release_url/Godot_v${GODOT_VERSION}_export_templates.tpz"

          printf '%s  %s\n' "$GODOT_EDITOR_SHA512" "$editor_archive" | sha512sum --check --strict
          printf '%s  %s\n' "$GODOT_TEMPLATES_SHA512" "$template_archive" | sha512sum --check --strict

          mkdir -p "$RUNNER_TEMP/godot-editor" "$RUNNER_TEMP/godot-templates" "$HOME/.local/bin"
          unzip -q "$editor_archive" -d "$RUNNER_TEMP/godot-editor"
          install -m 0755 \
            "$RUNNER_TEMP/godot-editor/Godot_v${GODOT_VERSION}_linux.x86_64" \
            "$HOME/.local/bin/godot"

          unzip -q "$template_archive" -d "$RUNNER_TEMP/godot-templates"
          template_dir="$HOME/.local/share/godot/export_templates/$GODOT_TEMPLATE_VERSION"
          mkdir -p "$template_dir"
          cp -R "$RUNNER_TEMP/godot-templates/templates/." "$template_dir/"

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/godot" --version

      - name: Import and test project
        run: |
          set -euo pipefail
          godot --headless --path . --import
          godot --headless --path . --quit
          GODOT_BIN=godot tools/run_tests.sh

      - name: Export desktop targets
        run: |
          set -euo pipefail
          mkdir -p build/windows build/linux build/dist
          godot --headless --path . --export-release \
            "Windows Desktop" build/windows/Sixty-Second-Accomplice.exe
          godot --headless --path . --export-release \
            "Linux" build/linux/Sixty-Second-Accomplice.x86_64
          godot --headless --path . --export-release \
            "macOS" build/dist/Sixty-Second-Accomplice-macos-universal.zip

          bash tools/copy_notices.sh build/windows/licenses
          bash tools/copy_notices.sh build/linux/licenses

          mkdir -p build/macos-package
          unzip -q build/dist/Sixty-Second-Accomplice-macos-universal.zip \
            -d build/macos-package
          macos_app="$(find build/macos-package -type d -name '*.app' -print -quit)"
          test -n "$macos_app"
          bash tools/copy_notices.sh "$macos_app/Contents/Resources/Licenses"
          rm build/dist/Sixty-Second-Accomplice-macos-universal.zip
          (
            cd build/macos-package
            zip -9 -r ../dist/Sixty-Second-Accomplice-macos-universal.zip .
          )

          test -f build/windows/Sixty-Second-Accomplice.exe
          test -f build/linux/Sixty-Second-Accomplice.x86_64
          test -f build/dist/Sixty-Second-Accomplice-macos-universal.zip

      - name: Package and checksum builds
        run: |
          set -euo pipefail
          pushd build/windows
          zip -9 -r ../dist/Sixty-Second-Accomplice-windows-x86_64.zip .
          popd

          pushd build/linux
          zip -9 -r ../dist/Sixty-Second-Accomplice-linux-x86_64.zip .
          popd

          pushd build/dist
          sha256sum ./*.zip > SHA256SUMS.txt
          sha256sum --check SHA256SUMS.txt
          popd

      - name: Upload verified release files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-release-files-${{ env.RELEASE_TAG }}
          path: build/dist/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish immutable GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download verified release files
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: desktop-release-files-${{ env.RELEASE_TAG }}
          path: release-files

      - name: Validate immutable tag and release state
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_SHA: ${{ needs.build.outputs.build_sha }}
        run: |
          set -euo pipefail
          test -f release-files/SHA256SUMS.txt
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; immutable releases are not overwritten." >&2
            exit 1
          fi
          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            existing_sha="$(gh api "repos/$GITHUB_REPOSITORY/commits/$RELEASE_TAG" --jq .sha)"
            if [[ "$existing_sha" != "$BUILD_SHA" ]]; then
              echo "Tag $RELEASE_TAG points to $existing_sha, not built commit $BUILD_SHA." >&2
              exit 1
            fi
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_SHA: ${{ needs.build.outputs.build_sha }}
        run: |
          set -euo pipefail
          gh release create "$RELEASE_TAG" release-files/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$BUILD_SHA" \
            --title "Sixty-Second Accomplice $RELEASE_TAG" \
            --notes "Unsigned Windows, Linux, and macOS development builds. The macOS package is not code-signed or notarized and may trigger Gatekeeper. Verify downloads with SHA256SUMS.txt."
